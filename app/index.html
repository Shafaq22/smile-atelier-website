          "@type": "OpeningHoursSpecification",

            "Monday",

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How long does the veneer process take?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Typically, the process requires two to three visits over a three-week period. This allows time for digital smile design, temporary trial veneers, and master ceramic fabrication."
            }
          },
          {
            "@type": "Question",
            "name": "Do porcelain veneers look natural?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Our master ceramists hand-layer porcelain with varying degrees of opacity and surface texture to mimic the light-reflecting properties of natural enamel."
            }
          },
          {
            "@type": "Question",
            "name": "Are veneers permanent?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Porcelain veneers are a long-term restoration. With proper home care and regular cleanings, they typically last between 10 to 20 years before needing replacement."
            }
          },
          {
            "@type": "Question",
            "name": "Is the veneer procedure painful?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. We use advanced local anesthesia and offer sedation options. Most patients report minimal discomfort during the preparation and bonding phases."
            }
          },
          {
            "@type": "Question",
            "name": "How should I care for my new veneers?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Brush and floss normally with non-abrasive toothpaste, and avoid biting directly into hard objects like ice or nuts. A protective nightguard is recommended."
            }
          }
        ]
      }
    </script>
